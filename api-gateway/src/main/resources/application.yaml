server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: usuario-service
          uri: lb://USUARIO-SERVICE
          predicates:
            - Path=/api/usuarios/**, /api/clientes/**

        - id: catalogo-service
          uri: lb://CATALOGO-SERVICE
          predicates:
            - Path=/api/productos/**, /api/categorias/**

        - id: inventario-service
          uri: lb://INVENTARIO-SERVICE
          predicates:
            - Path=/api/inventario/**

        - id: carrito-service
          uri: lb://CARRITO-SERVICE
          predicates:
            - Path=/api/carrito/**

        - id: pedido-service
          uri: lb://PEDIDO-SERVICE
          predicates:
            - Path=/api/pedidos/**

        - id: despacho-service
          uri: lb://DESPACHO-SERVICE
          predicates:
            - Path=/api/despachos/**

        - id: pago-service
          uri: lb://PAGO-SERVICE
          predicates:
            - Path=/api/pagos/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/