services:
  - type: web
    name: eureka-server
    env: docker
    rootDir: eureka-server
    plan: free

  - type: web
    name: api-gateway
    env: docker
    rootDir: api-gateway
    plan: free
    envVars:
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://tu-eureka-server.onrender.com/eureka/

  - type: web
    name: carrito-service
    env: docker
    rootDir: carrito-service
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://tu-db-remota:3306/db_carrito
      - key: SPRING_DATASOURCE_USERNAME
        value: tu_usuario
      - key: SPRING_DATASOURCE_PASSWORD
        value: tu_password
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://tu-eureka-server.onrender.com/eureka/
