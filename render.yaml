services:
  # 1.EUREKA
  - type: web
    name: eureka-server
    env: docker
    dockerContext: ./eureka-server
    plan: free
    
  # 2. API GATEWAY 
  - type: web
    name: api-gateway
    env: docker
    dockerContext: ./api-gateway
    plan: free
    envVars:
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://tu-eureka-server.onrender.com/eureka/ 

  # 3. MICROSERVICIOS DE NEGOCIO
  - type: web
    name: carrito-service
    env: docker
    dockerContext: ./carrito-service
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://tu-db-remota:3306/db_carrito
      - key: SPRING_DATASOURCE_USERNAME
        value: tu_usuario
      - key: SPRING_DATASOURCE_PASSWORD
        value: tu_password
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://tu-eureka-server.onrender.com/eureka/

